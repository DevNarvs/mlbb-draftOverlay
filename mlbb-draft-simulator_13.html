<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>MLBB Draft Simulator — MPL PH Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{width:1920px;height:1080px}
  body{background:#0c1018;color:#fff;font-family:'Bebas Neue','Barlow Condensed',Impact,sans-serif;width:1920px;min-height:1080px;overflow-x:hidden}
  body.obs-mode{background:transparent!important}
  body.obs-mode .admin-bar,body.obs-mode .admin-panel,body.obs-mode .hero-picker-wrap{display:none!important}
  ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:rgba(255,255,255,.02)}::-webkit-scrollbar-thumb{background:#2a3048;border-radius:4px}

  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
  @keyframes heroIn{from{opacity:0;transform:scale(.85) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}
  @keyframes banIn{from{opacity:0;transform:scale(.6) rotate(-15deg)}to{opacity:1;transform:scale(1) rotate(0)}}
  @keyframes glowPulse{0%,100%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 20px rgba(255,255,255,.12)}}
  @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
  @keyframes sponsorFade{0%{opacity:0;transform:translateY(8px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-8px)}}
  @keyframes heroFloat{0%,100%{transform:scale(1.06) translateY(0)}50%{transform:scale(1.06) translateY(-10px)}}

  .overlay{width:1920px;margin:0 auto;padding:0 24px}
  .header-row{display:flex;height:56px;margin-top:8px}
  .header-blue{flex:1;display:flex;align-items:center;padding-left:24px;gap:14px;background:linear-gradient(90deg,#003faa,#0060dd 85%,#0070ee00);clip-path:polygon(0 0,96% 0,92% 100%,0 100%);position:relative;overflow:hidden}
  .header-red{flex:1;display:flex;align-items:center;justify-content:flex-end;padding-right:24px;gap:14px;background:linear-gradient(270deg,#aa1020,#dd2040 85%,#dd204000);clip-path:polygon(8% 0,100% 0,100% 100%,4% 100%);position:relative;overflow:hidden}
  .header-logo{width:36px;height:36px;border-radius:6px;object-fit:contain;flex-shrink:0}
  .header-logo-ph{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;font-family:'Bebas Neue';flex-shrink:0;background:rgba(255,255,255,.15)}
  .header-bg-logo{position:absolute;height:140%;opacity:.07;pointer-events:none}
  .header-blue .header-bg-logo{right:8%;top:50%;transform:translateY(-50%)}
  .header-red .header-bg-logo{left:8%;top:50%;transform:translateY(-50%)}
  .header-text{font-size:22px;font-weight:800;letter-spacing:5px;font-family:'Bebas Neue';text-transform:uppercase;text-shadow:0 2px 6px rgba(0,0,0,.5)}
  .header-gap{width:200px;flex-shrink:0}

  .bans-row{display:flex;align-items:center;padding:8px 0;margin-top:2px}
  .bans-side{flex:1;display:flex;gap:8px;justify-content:center}
  .bans-center{width:200px;text-align:center;flex-shrink:0;font-size:10px;letter-spacing:4px;color:#3a3e55;font-family:'Barlow Condensed';font-weight:700}
  .ban-circle{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;transition:all .2s}
  .ban-circle.empty{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05)}
  .ban-circle.filled{border:2px solid rgba(255,255,255,.06);filter:grayscale(.7) brightness(.5);animation:banIn .25s ease-out}
  .ban-circle.active-blue{border:2px solid #0070dd;animation:pulse 1.5s infinite;background:rgba(0,100,255,.06)}
  .ban-circle.active-red{border:2px solid #dd2244;animation:pulse 1.5s infinite;background:rgba(255,30,60,.06)}
  .ban-circle .ban-x{position:absolute;width:130%;height:2.5px;background:#ff2244;transform:rotate(-45deg);box-shadow:0 0 6px rgba(255,20,50,.5)}
  .ban-circle .initials{font-size:12px;font-weight:900;color:rgba(255,255,255,.4)}
  .ban-circle .empty-x{font-size:14px;color:#1a1e2a;font-weight:900}

  .picks-row{display:flex;align-items:stretch;margin-top:2px}
  .picks-side{flex:1;display:flex;gap:3px}
  .picks-center{width:200px;flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(180deg,#0c0f1a,#080a12);border:1px solid rgba(255,255,255,.04);padding:12px 8px}
  .pick-card{flex:1;min-height:260px;position:relative;overflow:hidden;transition:all .3s;border-top:2px solid #12151f;background:#0a0c14}
  .pick-card.filled{animation:heroIn .4s ease-out}
  .pick-card.active{animation:glowPulse 2s infinite}
  .pick-card-inner{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0;position:relative}
  .pick-card-inner.has-img{padding:0;justify-content:flex-end}
  .pick-card-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:top center;animation:heroFloat 4s ease-in-out infinite}
  .pick-card-overlay{position:relative;z-index:1;width:100%;padding:10px 6px 8px;text-align:center;background:linear-gradient(0deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.5) 50%,transparent 100%)}
  .pick-avatar{border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;letter-spacing:1px;margin-bottom:8px}
  .pick-name{font-size:14px;font-weight:800;letter-spacing:2px;font-family:'Barlow Condensed';text-transform:uppercase;color:#e8ecf4;text-align:center;line-height:1.1}
  .pick-role{font-size:8px;letter-spacing:2px;color:#6a7590;font-family:'Barlow Condensed';font-weight:700;margin-top:3px}
  .pick-empty{width:50px;height:50px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;font-family:'Bebas Neue'}

  .players-row{display:flex}
  .players-side{flex:1;display:flex;gap:3px}
  .players-center{width:200px;flex-shrink:0}
  .player-name{flex:1;text-align:center;padding:7px 2px;font-size:11px;font-weight:800;letter-spacing:2px;font-family:'Barlow Condensed';text-transform:uppercase;transition:all .3s}
  .timer-bar{width:90px;height:4px;background:#1a1e2e;border-radius:2px;overflow:hidden;margin-top:4px}
  .timer-fill{height:100%;border-radius:2px;transition:width .9s linear}
  .toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:999;background:#e02040;padding:10px 28px;border-radius:6px;font-size:14px;font-family:'Barlow',sans-serif;font-weight:700;letter-spacing:1px;box-shadow:0 4px 24px rgba(255,0,0,.4);animation:fadeIn .2s}

  .admin-bar{width:1920px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:'Inter',sans-serif;border-top:1px solid rgba(255,255,255,.08);margin-top:10px;background:rgba(20,24,40,.95)}
  .admin-bar .abtn{padding:7px 16px;border-radius:6px;font-weight:600;font-size:12px;letter-spacing:.5px;cursor:pointer;border:none;transition:all .15s;font-family:'Inter',sans-serif}
  .admin-bar .abtn:disabled{opacity:.3;cursor:not-allowed}
  .admin-bar .abtn.primary{background:#2979ff;color:#fff}.admin-bar .abtn.primary:hover:not(:disabled){background:#4090ff}
  .admin-bar .abtn.warn{background:#e09900;color:#fff}.admin-bar .abtn.warn:hover:not(:disabled){background:#f0aa22}
  .admin-bar .abtn.danger{background:#dd3355;color:#fff}.admin-bar .abtn.danger:hover:not(:disabled){background:#ee4466}
  .admin-bar .abtn.ghost{background:rgba(255,255,255,.08);color:#a0aac0;border:1px solid rgba(255,255,255,.12)}.admin-bar .abtn.ghost:hover{background:rgba(255,255,255,.14);color:#d0d8ee}
  .admin-bar .sep{height:24px;width:1px;background:rgba(255,255,255,.12)}
  .admin-bar label{font-size:13px;color:#8a95b8;display:flex;align-items:center;gap:6px;font-weight:500}
  .admin-bar input[type=number]{width:52px;padding:6px 8px;border-radius:5px;border:1px solid rgba(255,255,255,.14);background:rgba(255,255,255,.08);color:#d0d8ee;font-size:13px;font-family:'Inter';outline:none}

  .admin-panel{width:1920px;margin:0 auto;padding:18px 24px;display:flex;gap:20px;flex-wrap:wrap;font-family:'Inter',sans-serif;border-top:1px solid rgba(255,255,255,.06);background:rgba(18,22,38,.95)}
  .admin-card{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:16px 18px;display:flex;flex-direction:column;gap:7px;min-width:180px}
  .admin-card .card-title{font-size:11px;letter-spacing:2px;font-weight:700;text-transform:uppercase;margin-bottom:4px}
  .admin-card input,.admin-card textarea{padding:7px 11px;border-radius:6px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#d0d8ee;font-size:13px;font-family:'Inter',sans-serif;outline:none;width:100%;transition:border-color .15s}
  .admin-card input:focus,.admin-card textarea:focus{border-color:rgba(100,140,255,.4)}
  .admin-card textarea{resize:vertical;font-family:'Inter',monospace;font-size:11px}
  .admin-card .abtn{padding:6px 14px;border-radius:5px;font-weight:600;font-size:11px;cursor:pointer;border:none;font-family:'Inter'}

  .hero-picker-wrap{width:1920px;margin:0 auto;padding:12px 24px 20px;border-top:1px solid rgba(255,255,255,.06);background:rgba(14,18,32,.95)}
  .filters{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center;font-family:'Inter',sans-serif}
  .filters .search-input{padding:8px 12px 8px 32px;border-radius:6px;width:220px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:#d0d8ee;font-size:13px;font-family:'Inter';outline:none}
  .filters .search-input:focus{border-color:rgba(100,140,255,.35)}
  .filters .role-btn{padding:7px 14px;border-radius:6px;border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter';transition:all .15s;background:rgba(255,255,255,.03);color:#7a86a0}
  .filters .role-btn.active{background:rgba(255,255,255,.12);color:#e0e6f4;border-color:rgba(255,255,255,.18)}
  .filters .role-btn:hover{background:rgba(255,255,255,.08);color:#b0bacc}
  .turn-ind{margin-left:auto;font-size:12px;font-weight:700;letter-spacing:2px;font-family:'Barlow Condensed';padding:6px 16px;border-radius:6px;animation:pulse 1.5s infinite}
  .hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:5px;max-height:320px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#252a3a transparent}
  .hero-cell{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 3px 6px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.035);transition:all .12s;position:relative;overflow:hidden;cursor:default}
  .hero-cell.available{cursor:pointer}.hero-cell.available:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.18);transform:scale(1.04)}
  .hero-cell.used{opacity:.2;pointer-events:none}
  .hero-mini-avatar{border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff}
  .hero-cell-name{font-size:10px;font-weight:600;color:#8a95b0;font-family:'Inter';max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .hero-used-line{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
  .hero-used-line div{width:55%;height:2px;background:#ff2244;transform:rotate(-45deg)}
  .loading-msg{text-align:center;padding:40px;font-family:'Inter';color:#6a7590;font-size:14px}
</style>
</head>
<body>
<div id="app"></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.26.10/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useCallback,useRef,useMemo}=React;

// Role map for heroes (fallback)
const ROLE_MAP={"Miya":"Marksman","Balmond":"Fighter","Saber":"Assassin","Alice":"Mage","Nana":"Mage","Tigreal":"Tank","Alucard":"Fighter","Karina":"Assassin","Akai":"Tank","Franco":"Tank","Bane":"Fighter","Bruno":"Marksman","Clint":"Marksman","Rafaela":"Support","Eudora":"Mage","Zilong":"Fighter","Fanny":"Assassin","Layla":"Marksman","Minotaur":"Tank","Lolita":"Tank","Hayabusa":"Assassin","Freya":"Fighter","Gord":"Mage","Natalia":"Assassin","Kagura":"Mage","Chou":"Fighter","Sun":"Fighter","Alpha":"Fighter","Ruby":"Fighter","Yi Sun-shin":"Marksman","Moskov":"Marksman","Johnson":"Tank","Cyclops":"Mage","Estes":"Support","Hilda":"Fighter","Aurora":"Mage","Lapu-Lapu":"Fighter","Vexana":"Mage","Roger":"Fighter","Karrie":"Marksman","Gatotkaca":"Tank","Jawhead":"Fighter","Irithel":"Marksman","Grock":"Tank","Argus":"Fighter","Odette":"Mage","Lancelot":"Assassin","Diggie":"Support","Hylos":"Tank","Zhask":"Mage","Helcurt":"Assassin","Pharsa":"Mage","Lesley":"Marksman","Martis":"Fighter","Hanabi":"Marksman","Chang'e":"Mage","Kaja":"Support","Selena":"Assassin","Barats":"Tank","Aldous":"Fighter","Claude":"Marksman","Valir":"Mage","Badang":"Fighter","Khufra":"Tank","Granger":"Marksman","Guinevere":"Fighter","Esmeralda":"Mage","Kadita":"Mage","Cecilion":"Mage","Carmilla":"Support","Atlas":"Tank","Popol and Kupa":"Marksman","Yu Zhong":"Fighter","Luo Yi":"Mage","Benedetta":"Assassin","Brody":"Marksman","Paquito":"Fighter","Alice":"Mage","Lunox":"Mage","Belerick":"Tank","Baxia":"Tank","Minsitthar":"Fighter","Thamuz":"Fighter","Khaleed":"Fighter","Wanwan":"Marksman","Silvanna":"Fighter","X.Borg":"Fighter","Dyrroth":"Fighter","Harith":"Mage","Gusion":"Assassin","Beatrix":"Marksman","Faramis":"Support","Leomord":"Fighter","Hanzo":"Assassin","Terizla":"Fighter","Kimmy":"Marksman","Mathilda":"Support","Phoveus":"Fighter","Edith":"Tank","Masha":"Fighter","Harley":"Assassin","Lylia":"Mage","Vale":"Mage","Angela":"Support","Floryn":"Support","Valentina":"Mage","Aamon":"Assassin","Aulus":"Fighter","Natan":"Marksman","Uranus":"Tank","Gloo":"Tank","Fredrinn":"Fighter","Joy":"Assassin","Xavier":"Mage","Melissa":"Marksman","Yin":"Fighter","Arlott":"Fighter","Novaria":"Mage","Nolan":"Assassin","Ixia":"Marksman","Cici":"Fighter","Chip":"Support","Julian":"Assassin","Zhuxin":"Mage","Suyou":"Assassin","Lukas":"Fighter","Kalea":"Support","Zetian":"Mage","Obsidia":"Marksman","Sora":"Fighter","Marcel":"Support"};

// Portrait overrides (wiki full portraits)
const PORTRAIT_MAP={"Aamon":"https://static.wikia.nocookie.net/mobile-legends/images/c/c8/Hero1091-portrait.png/revision/latest?cb=20251225192214","Diggie":"https://static.wikia.nocookie.net/mobile-legends/images/1/17/Hero481-portrait.png/revision/latest?cb=20241021141804","Sora":"https://static.wikia.nocookie.net/mobile-legends/images/0/00/Hero1311-portrait.png/revision/latest?cb=20251218014024"};

const ROLES=["All","Tank","Fighter","Assassin","Mage","Marksman","Support"];
const ROLE_ICONS={Tank:"🛡",Fighter:"⚔",Assassin:"🗡",Mage:"✦",Marksman:"◎",Support:"♥"};

const DRAFT_SEQ=[
  {phase:"ban1",type:"ban",team:"blue",label:"BAN PHASE 1"},{phase:"ban1",type:"ban",team:"red",label:"BAN PHASE 1"},
  {phase:"ban1",type:"ban",team:"blue",label:"BAN PHASE 1"},{phase:"ban1",type:"ban",team:"red",label:"BAN PHASE 1"},
  {phase:"pick1",type:"pick",team:"blue",label:"PICK PHASE 1"},{phase:"pick1",type:"pick",team:"red",label:"PICK PHASE 1"},
  {phase:"pick1",type:"pick",team:"red",label:"PICK PHASE 1"},{phase:"pick1",type:"pick",team:"blue",label:"PICK PHASE 1"},
  {phase:"ban2",type:"ban",team:"red",label:"BAN PHASE 2"},{phase:"ban2",type:"ban",team:"blue",label:"BAN PHASE 2"},
  {phase:"pick2",type:"pick",team:"red",label:"PICK PHASE 2"},{phase:"pick2",type:"pick",team:"blue",label:"PICK PHASE 2"},
  {phase:"pick2",type:"pick",team:"blue",label:"PICK PHASE 2"},{phase:"pick2",type:"pick",team:"red",label:"PICK PHASE 2"},
  {phase:"ban3",type:"ban",team:"red",label:"BAN PHASE 3"},{phase:"ban3",type:"ban",team:"blue",label:"BAN PHASE 3"},
  {phase:"pick3",type:"pick",team:"red",label:"PICK PHASE 3"},{phase:"pick3",type:"pick",team:"blue",label:"PICK PHASE 3"},
];

const DT=30;
function hu(id){let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);return Math.abs(h)%360}
function hc(id){return`hsl(${hu(id)},50%,35%)`}
function hcl(id){return`hsl(${hu(id)},55%,55%)`}
function hcv(id){return`hsl(${hu(id)},65%,50%)`}
function ini(n){return n.split(/[\s\-']+/).map(w=>w[0]).join("").slice(0,2).toUpperCase()}

function App(){
  const[heroes,setHeroes]=useState([]);
  const[loading,setLoading]=useState(true);
  const[s,setS]=useState({
    step:-1,
    blue:{picks:[],bans:[],name:"AURORA",tag:"RORA",logo:"",players:["DOMENGKITE","YUE","DEMONKITE","EDWARD","LIGHT"]},
    red:{picks:[],bans:[],name:"FALCON",tag:"FLCN",logo:"",players:["KYLE","FLAP","SUPERMARCO","OWOWEN","HADJI"]},
    timer:DT,td:DT,started:false,paused:false,done:false,history:[],gameNum:2,
    matchType:"REGULAR SEASON",matchWeek:"MATCH 1 • BO5",
    sponsors:["Smart","Globe","Moonton"],sponsorLogos:["","",""],
  });
  const[search,setSearch]=useState("");
  const[role,setRole]=useState("All");
  const[admin,setAdmin]=useState(false);
  const[picker,setPicker]=useState(true);
  const[toast,setToast]=useState(null);
  const[imgJson,setImgJson]=useState("");
  const[spIdx,setSpIdx]=useState(0);
  const[obsMode]=useState(()=>new URLSearchParams(window.location.search).get("obs")==="true");
  const tRef=useRef(null),ttRef=useRef(null);

  // Fetch heroes from API
  useEffect(()=>{
    fetch("https://mlbb.rone.dev/api/heroes?size=150&index=1&order=desc&lang=en")
      .then(r=>r.json())
      .then(data=>{
        const list=data.data.records.map(r=>{
          const name=r.data.hero.data.name;
          const head=r.data.hero.data.head;
          const heroId=r.data.hero_id;
          const id=name.toLowerCase().replace(/[\s'.&]+/g,"_").replace(/_+$/,"");
          return{
            id,name,heroId,
            role:ROLE_MAP[name]||"Fighter",
            head,
            image:PORTRAIT_MAP[name]||null,
          };
        }).sort((a,b)=>a.name.localeCompare(b.name));
        setHeroes(list);
        setLoading(false);
      })
      .catch(()=>{
        // Fallback: use role map keys
        const list=Object.entries(ROLE_MAP).map(([name,role])=>{
          const id=name.toLowerCase().replace(/[\s'.&]+/g,"_").replace(/_+$/,"");
          return{id,name,role,head:null,image:PORTRAIT_MAP[name]||null};
        }).sort((a,b)=>a.name.localeCompare(b.name));
        setHeroes(list);
        setLoading(false);
      });
  },[]);

  useEffect(()=>{document.body.classList.toggle("obs-mode",obsMode)},[obsMode]);
  useEffect(()=>{const iv=setInterval(()=>setSpIdx(p=>(p+1)%Math.max(s.sponsors.length,1)),3000);return()=>clearInterval(iv)},[s.sponsors.length]);

  const cur=s.step>=0&&s.step<DRAFT_SEQ.length?DRAFT_SEQ[s.step]:null;
  const used=useMemo(()=>{const st=new Set();["blue","red"].forEach(t=>{s[t].picks.forEach(h=>st.add(h.id));s[t].bans.forEach(h=>st.add(h.id))});return st},[s.blue,s.red]);
  const filtered=useMemo(()=>heroes.filter(h=>(role==="All"||h.role===role)&&(!search||h.name.toLowerCase().includes(search.toLowerCase()))),[search,role,heroes]);

  const flash=useCallback(m=>{setToast(m);if(ttRef.current)clearTimeout(ttRef.current);ttRef.current=setTimeout(()=>setToast(null),2000)},[]);

  function loadImages(json){try{const map=JSON.parse(json);Object.entries(map).forEach(([k,url])=>{const h=heroes.find(x=>x.name.toLowerCase()===k.toLowerCase()||x.id===k);if(h)h.image=url});flash("Loaded "+Object.keys(map).length+" images");setImgJson(json)}catch(e){flash("Invalid JSON")}}

  useEffect(()=>{
    if(tRef.current)clearInterval(tRef.current);
    if(!s.started||s.paused||s.done||s.step<0||!heroes.length)return;
    tRef.current=setInterval(()=>{
      setS(p=>{
        if(p.timer<=1){const u=new Set([...p.blue.picks,...p.red.picks,...p.blue.bans,...p.red.bans].map(x=>x.id));const av=heroes.filter(h=>!u.has(h.id));if(!av.length||p.step>=DRAFT_SEQ.length)return{...p,done:true};return sel(p,av[Math.floor(Math.random()*av.length)])}
        return{...p,timer:p.timer-1};
      });
    },1000);
    return()=>clearInterval(tRef.current);
  },[s.started,s.paused,s.done,s.step,heroes]);

  function sel(st,hero){const a=DRAFT_SEQ[st.step];if(!a)return{...st,done:true};const k=a.type==="ban"?"bans":"picks";const nx=st.step+1;return{...st,[a.team]:{...st[a.team],[k]:[...st[a.team][k],hero]},step:nx,timer:st.td,done:nx>=DRAFT_SEQ.length,history:[...st.history,{hero,action:a.type,team:a.team}]}}

        E("div",{className:"players-side"},s.red.players.map((n,i)=>E("div",{key:i,className:"player-name",style:{background:s.red.picks[i]?"linear-gradient(180deg,#aa1525,#771020)":"linear-gradient(180deg,#1a0c10,#120810)",borderBottom:`3px solid ${s.red.picks[i]?"#dd2244":"#1a0c10"}`,color:s.red.picks[i]?"#fff":"#5a2a3a"}},n)))

      E("button",{className:"abtn warn",disabled:!s.started||s.done,onClick:()=>setS(p=>({...p,paused:!p.paused}))},s.paused?"▶ RESUME":"⏸ PAUSE"),
      E("button",{className:"abtn danger",onClick:()=>setS(p=>({...p,step:-1,started:false,paused:false,done:false,timer:p.td,blue:{...p.blue,picks:[],bans:[]},red:{...p.red,picks:[],bans:[]},history:[]}))},"↺ RESET"),

      )
    ),

    // Admin panel
    admin&&E("div",{className:"admin-panel"},
      ["blue","red"].map(t=>E("div",{key:t,className:"admin-card",style:{borderColor:t==="blue"?"rgba(0,100,255,.15)":"rgba(255,30,60,.15)"}},
        E("div",{className:"card-title",style:{color:t==="blue"?"#4dabff":"#ff6677"}},t.toUpperCase()+" TEAM"),
        E("input",{value:s[t].name,onChange:e=>setS(p=>({...p,[t]:{...p[t],name:e.target.value}})),placeholder:"Team Name"}),
        E("input",{value:s[t].tag,onChange:e=>setS(p=>({...p,[t]:{...p[t],tag:e.target.value}})),placeholder:"Tag (short)"}),
        E("input",{value:s[t].logo,onChange:e=>setS(p=>({...p,[t]:{...p[t],logo:e.target.value}})),placeholder:"Logo URL (png/svg)"}),
        E("div",{style:{fontSize:9,color:"#6a7590",fontWeight:600,letterSpacing:1,marginTop:4}},"PLAYERS"),
        s[t].players.map((pn,pi)=>E("input",{key:pi,value:pn,onChange:e=>{const np=[...s[t].players];np[pi]=e.target.value;setS(p=>({...p,[t]:{...p[t],players:np}}))}}))
      )),
      E("div",{className:"admin-card",style:{minWidth:240}},
        E("div",{className:"card-title",style:{color:"#6acc8a"}},"HERO PORTRAITS"),
        E("textarea",{rows:5,value:imgJson,onChange:e=>setImgJson(e.target.value),placeholder:'{"Sora":"https://...","Aamon":"https://..."}'}),

        )),

              avatar
                ?E("img",{src:avatar,style:{width:40,height:40,borderRadius:6,objectFit:"cover",filter:u?"grayscale(1)":"none",boxShadow:`0 2px 8px rgba(0,0,0,.3)`}})
                :E("div",{className:"hero-mini-avatar",style:{width:40,height:40,fontSize:14,background:`linear-gradient(135deg,${hc(hero.id)},${hcl(hero.id)})`,boxShadow:`0 2px 8px ${hc(hero.id)}44`,filter:u?"grayscale(1)":"none"}},ini(hero.name)),
              E("span",{className:"hero-cell-name"},hero.name),
              u&&E("div",{className:"hero-used-line"},E("div"))

        )
      )
    )
  );
}

function BanC(hero,team,active,i){
  const cls=hero?"ban-circle filled":active?`ban-circle active-${team}`:"ban-circle empty";
  const bg=hero?{background:`linear-gradient(135deg,${hc(hero.id)}77,${hcl(hero.id)}33)`}:{};
  const E=React.createElement;
  const avatar=hero?(hero.head||hero.image):null;
  return E("div",{key:i,className:cls,style:bg},
    hero?E(React.Fragment,null,
      avatar?E("img",{src:avatar,style:{width:"100%",height:"100%",objectFit:"cover",borderRadius:"50%",position:"absolute"}}):E("span",{className:"initials"},ini(hero.name)),
      E("div",{className:"ban-x"})
    ):E("span",{className:"empty-x"},"✕")
  );
}

function PickC(hero,team,index,active,teamLogo,teamTag){

  const bg=hero?{background:hero.image?"#0a0c14":`linear-gradient(${isB?"165deg":"195deg"},${hc(hero.id)}55 0%,${hc(hero.id)}15 50%,#0a0c1400 100%)`,borderTopColor:hcv(hero.id)+"66"}:active?{background:`linear-gradient(170deg,${accent}22 0%,${accent}08 100%)`,borderTopColor:bright}:{};
  const E=React.createElement;
  return E("div",{key:index,className:`pick-card${hero?" filled":""}${active?" active":""}`,style:bg},
    hero?E("div",{className:`pick-card-inner${hero.image?" has-img":""}`,style:{padding:hero.image?0:"10px 4px"}},
      hero.image
        ?E(React.Fragment,null,
          E("img",{src:hero.image,className:"pick-card-img",style:{animationDelay:(index*.6)+"s"}}),
          E("div",{className:"pick-card-overlay"},
            E("div",{className:"pick-name"},hero.name),
            E("div",{className:"pick-role"},hero.role.toUpperCase())
          ))
        :E(React.Fragment,null,
          hero.head
            ?E("img",{src:hero.head,style:{width:72,height:72,borderRadius:10,objectFit:"cover",boxShadow:`0 4px 20px rgba(0,0,0,.4)`,border:"2px solid rgba(255,255,255,.1)",marginBottom:8}})
            :E("div",{className:"pick-avatar",style:{width:72,height:72,fontSize:26,letterSpacing:1,background:`linear-gradient(135deg,${hc(hero.id)},${hcv(hero.id)},${hcl(hero.id)})`,boxShadow:`0 4px 20px ${hc(hero.id)}55,inset 0 -3px 8px rgba(0,0,0,.3)`,border:`2px solid ${hcl(hero.id)}55`}},ini(hero.name)),
          E("div",{className:"pick-name"},hero.name),
          E("div",{className:"pick-role"},hero.role.toUpperCase())
        )
    ):E("div",{className:"pick-card-inner",style:{justifyContent:"center",alignItems:"center"}},
      active
        ?E("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",gap:8,animation:"pulse 2s ease-in-out infinite"}},
          teamLogo?E("img",{src:teamLogo,style:{width:64,height:64,objectFit:"contain",opacity:.5,filter:"drop-shadow(0 0 14px "+bright+"44)"}}):E("div",{style:{width:64,height:64,borderRadius:12,background:`linear-gradient(135deg,${accent}44,${accent}22)`,border:`2px solid ${accent}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26,fontWeight:900,fontFamily:"'Bebas Neue'",color:accent+"aa"}},teamTag?teamTag[0]:"?"),
          E("div",{style:{fontSize:9,letterSpacing:3,fontFamily:"'Barlow Condensed'",fontWeight:700,color:bright,textTransform:"uppercase"}},"PICKING...")
        )
        :E("div",{className:"pick-empty",style:{border:`2px dashed ${accent}25`,color:`${accent}35`}},index+1)
    )
  );
}
